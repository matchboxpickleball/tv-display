name: Sync Wix Bookings

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch bookings from Wix and generate sessions.json
        run: |
          node << 'SCRIPT'
          const https = require('https');

          const WIX_API_KEY = process.env.WIX_API_KEY;
          const WIX_SITE_ID = process.env.WIX_SITE_ID;

          function fetchPage(cursor) {
            return new Promise((resolve, reject) => {
              // Bookings Reader V2 "Query Extended Bookings".
              // The older /bookings/v2/bookings/query path is not a
              // documented endpoint and started returning generic 500s
              // (empty `details`) in May 2026 as Wix tightened the
              // V1 -> V2 cutover. This is the supported replacement.
              // Wix V2 rule: when paging with a cursor, the body must
              // contain ONLY cursorPaging — no filter, no sort. Otherwise
              // you get 400 "Invalid cursor. Sort or filter can not be
              // specified together with cursor".
              const queryObj = cursor
                ? { cursorPaging: { limit: 100, cursor } }
                : { filter: {}, cursorPaging: { limit: 100 } };

              const body = JSON.stringify({
                query: queryObj,
                withBookingAllowedActions: false,
                withBookingAttendanceInfo: false
              });
              const options = {
                hostname: 'www.wixapis.com',
                path: '/_api/bookings-reader/v2/extended-bookings/query',
                method: 'POST',
                headers: {
                  'Authorization': WIX_API_KEY,
                  'wix-site-id': WIX_SITE_ID,
                  'Content-Type': 'application/json',
                  'Accept': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log(`Wix API status: ${res.statusCode}`);
                  if (res.statusCode !== 200) {
                    console.log(`Wix API response: ${data}`);
                    reject(new Error(`Wix API returned ${res.statusCode}: ${data}`));
                    return;
                  }
                  resolve(JSON.parse(data));
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function fetchAll() {
            let all = [];
            let cursor = null;
            let pages = 0;
            while (pages < 20) {
              const data = await fetchPage(cursor);
              // Bookings Reader V2 returns `extendedBookings`, each wrapping
              // a `.booking` object that has the same shape we used before.
              const extended = data.extendedBookings || [];
              const bookings = extended
                .map(eb => (eb && eb.booking) ? eb.booking : eb)
                .filter(Boolean);
              all = all.concat(bookings);
              console.log(`Page ${pages + 1}: ${bookings.length} bookings (total: ${all.length})`);
              cursor = data.pagingMetadata?.cursors?.next || null;
              const hasNext = data.pagingMetadata?.hasNext || false;
              if (!hasNext || !cursor) break;
              pages++;
            }
            return all;
          }

          function cleanDate(d) {
            return (d || '').replace(/(\.\d+)?([+-]\d{2}:\d{2}|Z)$/, '');
          }

          async function main() {
            const bookings = await fetchAll();
            console.log(`Fetched ${bookings.length} total bookings from Wix`);

            // Filter: only CONFIRMED or CREATED, and from today onwards
            const now = new Date();
            const cutoff = new Date(now);
            cutoff.setHours(0, 0, 0, 0);
            cutoff.setTime(cutoff.getTime() - 3600000); // 1 hour before today

            let sessions = bookings
              .filter(b => b.status === 'CONFIRMED')
              .map(b => {
                const slot = b.bookedEntity?.slot || {};
                const contact = b.contactDetails || {};
                return {
                  name: (contact.firstName || 'Guest').trim(),
                  start: cleanDate(slot.startDate || ''),
                  end: cleanDate(slot.endDate || '')
                };
              })
              .filter(s => s.start && s.end)
              .filter(s => new Date(s.end) > cutoff);

            // Sort by start time
            sessions.sort((a, b) => new Date(a.start) - new Date(b.start));

            // ONE COURT: de-duplicate by time slot
            // Multiple people booking the same slot = playing together
            // Keep only one entry per unique start+end time
            const slotSeen = new Set();
            const uniqueSlots = [];
            for (const s of sessions) {
              const slotKey = `${s.start}|${s.end}`;
              if (!slotSeen.has(slotKey)) {
                slotSeen.add(slotKey);
                uniqueSlots.push(s);
              }
            }

            // ONE COURT: remove overlapping sessions
            // Sort by duration descending so longer bookings (primary booker) are kept
            uniqueSlots.sort((a, b) => {
              const durA = new Date(a.end) - new Date(a.start);
              const durB = new Date(b.end) - new Date(b.start);
              if (durB !== durA) return durB - durA; // longer first
              return new Date(a.start) - new Date(b.start); // then by start time
            });

            const noOverlap = [];
            for (const s of uniqueSlots) {
              const sStart = new Date(s.start).getTime();
              const sEnd   = new Date(s.end).getTime();
              const overlaps = noOverlap.some(k => {
                const kStart = new Date(k.start).getTime();
                const kEnd   = new Date(k.end).getTime();
                return sStart < kEnd && sEnd > kStart;
              });
              if (!overlaps) {
                noOverlap.push(s);
              }
            }
            // Re-sort by start time for display
            noOverlap.sort((a, b) => new Date(a.start) - new Date(b.start));
            sessions = noOverlap;

            // Merge consecutive same-name sessions
            const merged = [];
            for (const s of sessions) {
              if (merged.length > 0) {
                const last = merged[merged.length - 1];
                const sameName = (last.name || '').toLowerCase().trim() === (s.name || '').toLowerCase().trim();
                const sameDay = new Date(last.start).toDateString() === new Date(s.start).toDateString();
                const gap = new Date(s.start).getTime() - new Date(last.end).getTime();
                const contiguous = gap >= -60000 && gap <= 300000;
                if (sameName && sameDay && contiguous) {
                  if (new Date(s.end) > new Date(last.end)) last.end = s.end;
                  continue;
                }
              }
              merged.push({ name: s.name, start: s.start, end: s.end });
            }

            console.log(`Output: ${merged.length} sessions (after merge)`);

            const fs = require('fs');
            fs.writeFileSync('sessions.json', JSON.stringify({ sessions: merged }, null, 2));
            console.log('Written to sessions.json');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sessions.json
          if git diff --staged --quiet; then
            echo "No changes to sessions.json"
          else
            git commit -m "Auto-sync sessions from Wix [skip ci]"
            git push
          fi
