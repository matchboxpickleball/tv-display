<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="30">
  <title>TV Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Dark overlay for readability */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .message-box {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 60px 90px;
      text-align: center;
      max-width: 85vw;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.5);
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 22px;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .message-text {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      color: #ffffff;
      line-height: 1.25;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
    }

    .divider {
      width: 60px;
      height: 2px;
      background: rgba(255, 255, 255, 0.4);
      margin: 28px auto;
      border-radius: 2px;
    }

    .status {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 2px;
      margin-top: 28px;
    }

    /* Pulse dot to show live status */
    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="message-box">
    <div class="message-label">Message</div>
    <div class="divider"></div>
    <div class="message-text" id="msg">Loading...</div>
    <div class="status"><span class="live-dot"></span>Live Display</div>
  </div>

  <script>
    const SHEET_ID = "15Zw1mm015BATINEOy8rvu1Glevwja65JvjPHD2pqpTw";

    function loadMessage() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1&cachebust=${Date.now()}`;

      fetch(url)
        .then(res => res.text())
        .then(text => {
          const json = JSON.parse(text.substr(47).slice(0, -2));
          const message = json.table.rows[1].c[0].v;
          document.getElementById("msg").innerText = message;
        })
        .catch(() => {
          document.getElementById("msg").innerText = "Welcome!";
        });
    }

    // Load immediately on page open
    loadMessage();

    // Then refresh message every 30 seconds
    setInterval(loadMessage, 30000);
  </script>
</body>
</html>
