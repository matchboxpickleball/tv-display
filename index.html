  <meta charset="UTF-8">

  <style>
    :root {
      --orange: #E8531F;
      --blue:   #7AAEC8;
      --white:  #F5F0EC;
      --card:   rgba(0,0,0,0.52);
      --border: rgba(255,255,255,0.13);
      --muted:  rgba(255,255,255,0.48);
      --green:  #7BE56B;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:100vw; height:100vh;
      overflow:hidden; cursor:none;
      font-family:'DM Sans',sans-serif;
      color:var(--white);
      background:#120908;
    }

    /* Background */
    .bg {
      position:fixed; inset:0;
      background:url('./background.jpg') center center / cover no-repeat;
      z-index:0;
    }
    .bg-overlay {
      position:fixed; inset:0;
      background:linear-gradient(135deg,rgba(12,6,3,0.80) 0%,rgba(8,10,16,0.75) 100%);
      z-index:1;
    }

    /* Top bar */
    .top-bar {
      position:fixed; top:0; left:0; right:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 52px;
      border-bottom:1px solid var(--border);
      background:rgba(0,0,0,0.42);
      backdrop-filter:blur(14px);
      z-index:30;
    }
    .court-id {
      font-family:'Bebas Neue',sans-serif;
      font-size:26px; letter-spacing:5px;
      color:var(--orange);
    }
    .top-mid { display:flex; align-items:center; gap:10px; }
    .sdot {
      width:8px; height:8px; border-radius:50%;
      background:var(--muted); flex-shrink:0;
    }
    .sdot.on   { background:var(--green); animation:blink 2s infinite; }
    .sdot.warn { background:var(--orange); animation:blink 0.5s infinite; }
    .slabel {
      font-size:11px; letter-spacing:4px;
      text-transform:uppercase; color:var(--muted);
    }
    .clock {
      font-family:'Bebas Neue',sans-serif;
      font-size:58px; letter-spacing:3px;
      color:var(--white); min-width:90px; text-align:right;
      line-height:1;
    }

    /* Bottom bar */
    .bottom-bar {
      position:fixed; bottom:0; left:0; right:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:13px 52px;
      border-top:1px solid var(--border);
      background:rgba(0,0,0,0.42);
      backdrop-filter:blur(14px);
      z-index:30;

    .bottom-bar span {

    .inner {
      width:100%; padding:0 60px;

    /* ── GREETING ── */
    .g-left { flex:1.1; }

      text-transform:uppercase; color:var(--muted);
      margin-bottom:14px;

    .g-title {

    /* ── WARNING ── */
    .w-left { flex:1; text-align:right; }
    .w-badge {
      display:inline-block;
      background:var(--orange); color:#fff;
      font-size:11px; letter-spacing:5px;
      text-transform:uppercase;

    }
    .w-title {
      font-family:'Bebas Neue',sans-serif;

    .w-info {
      font-size:19px; font-weight:300; color:var(--muted);
    }
    .w-info strong { color:var(--white); font-weight:500; }
    .w-music {
      display:flex; align-items:center; gap:10px;

      width:3px; border-radius:2px;

    }
    .mwaves span:nth-child(1){ height:6px;  animation-delay:0s; }
    .mwaves span:nth-child(2){ height:13px; animation-delay:.12s; }
    .mwaves span:nth-child(3){ height:8px;  animation-delay:.24s; }
    .mwaves span:nth-child(4){ height:11px; animation-delay:.08s; }
    .mwaves span:nth-child(5){ height:5px;  animation-delay:.2s; }
    .mlabel {
      font-size:11px; letter-spacing:3px;
      text-transform:uppercase; color:var(--muted);
    }
    .w-divider {
      width:1px; height:240px; flex-shrink:0;
      background:rgba(232,83,31,0.28); margin:0 64px;
    }
    .w-right { flex:1; }
    .w-right-lbl {
      font-size:11px; letter-spacing:5px;
      text-transform:uppercase; color:rgba(232,83,31,0.75);
      margin-bottom:8px;
    }
    .w-count {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(100px,16vw,180px);
      letter-spacing:6px; line-height:1;
      color:var(--orange);
      animation:cpulse 1s ease-in-out infinite;
    }
    .w-end {
      font-size:15px; font-weight:300;
      color:var(--muted); letter-spacing:1px;
      margin-top:8px;
    }

    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes flash  { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes cpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(.97)} }
    @keyframes wave   { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.3)} }
  </style>

<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<!-- Alert audio (5-min warning only) -->

  <source src="" type="audio/mpeg">

</audio>

<script>
/* ══ CONFIG ════════════════════════════════════════════ */
const C = {
  CLUB_NAME:       "Matchbox Pickleball",
  TAGLINE:         "Have a great game",
  JSONBIN_BIN_ID:  "69fbf4d2adc21f119a64af0d",
  JSONBIN_API_KEY: "$2a$10$m1dUyhPxgduHzvGQ5v4ePOgsF.m3FqTSyBgWJ.QRAStlzaJ1bEyau",
  WARN_MUSIC_URL:  "./music.mp3", // mp3 URL, plays only at 5-min warning
  POLL_MS:         60_000,      // re-fetch every 60 s
  WARN_SECS:       300,         // 5 minutes
};
/* ═══════════════════════════════════════════════════════ */

/* Apply config */
document.getElementById('b-club').textContent = C.CLUB_NAME;
if (C.WARN_MUSIC_URL) document.querySelector('#warn-audio source').src = C.WARN_MUSIC_URL;

/* Clock */
function tick_clock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('date-bar').textContent =
    n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
setInterval(tick_clock, 1000); tick_clock();

/* Helpers */
function pd(s){
  // Strip timezone offset (e.g. +08:00 from Wix) so times display as local court time
  const clean = (s||'').replace(/(\.\d+)?([+-]\d{2}:\d{2}|Z)$/, '');
  return new Date(clean);
}
function firstName(n){ return (n||'').trim().split(/\s+/)[0]; }
function hhmm(d){ return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}).replace(':',''); }
function disp(d){ return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function msToMS(ms){
  if(ms<=0) return '00:00';
  const s=Math.floor(ms/1000), m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* Audio */
let actx=null;
const warnAudio=document.getElementById('warn-audio');
function beep(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  [0,700,1400].forEach(d=>{
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value=880;
    const t=actx.currentTime+d/1000;
    g.gain.setValueAtTime(0.45,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.start(t); o.stop(t+0.5);
  });
}
function startWarn(){ beep(); if(C.WARN_MUSIC_URL) warnAudio.play().catch(()=>{}); }
function stopWarn() { warnAudio.pause(); warnAudio.currentTime=0; }
document.addEventListener('click',()=>{ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); },{once:true});

/* State */
let sessions=[], cur='greeting', warnFired=false;

function showScreen(name){
  if(cur===name) return; cur=name;
  ['greeting','active','warning'].forEach(s=>
    document.getElementById(`screen-${s}`).classList.toggle('active',s===name));
  const dot=document.getElementById('sdot'), lbl=document.getElementById('slabel');
  dot.className='sdot';
  if(name==='active'){ dot.classList.add('on'); lbl.textContent='In session'; stopWarn(); }
  else if(name==='warning'){ dot.classList.add('warn'); lbl.textContent='Ending soon'; }
  else { lbl.textContent='Ready'; stopWarn(); }
}

/* Build greeting list */
function buildList(){
  const list=document.getElementById('session-list');
  const noMsg=document.getElementById('no-sess');
  const now=new Date();
  const today=sessions.filter(s=>{
    const st=pd(s.start), en=pd(s.end);
    return st.toDateString()===now.toDateString() && en>new Date(+now-3600000);
  });
  list.querySelectorAll('.srow').forEach(e=>e.remove());
  if(!today.length){ noMsg.style.display='block'; document.getElementById('b-next').textContent='No more sessions today'; return; }
  noMsg.style.display='none';
  today.slice(0,4).forEach(s=>{
    const st=pd(s.start), en=pd(s.end);
    const isNow=now>=st&&now<=en, isPast=now>en;
    const row=document.createElement('div');
    row.className='srow'+(isNow?' now':'');
    row.style.opacity=isPast?'0.38':'1';
    row.innerHTML=`<span class="sname">${firstName(s.name)}</span>`+
      `<span class="stime">${hhmm(st)} – ${hhmm(en)}</span>`+
      (isNow?'<span class="snow-badge">Now</span>':'');
    list.appendChild(row);
  });
  const nxt=today.find(s=>pd(s.end)>now);
  if(nxt){
    const st=pd(nxt.start), en=pd(nxt.end), isNow=now>=st&&now<=en;
    document.getElementById('b-next').textContent=isNow
      ?`Ongoing · ends ${disp(en)}`
      :`Next: ${nxt.name?firstName(nxt.name)+' · ':''}${hhmm(st)} – ${hhmm(en)}`;
  }
}

/* Main tick (every second) */
function tick(){
  const now=new Date();
  const active=sessions.find(s=>now>=pd(s.start)&&now<=pd(s.end));
  if(!active){
    warnFired=false; showScreen('greeting'); buildList(); return;
  }
  const st=pd(active.start), en=pd(active.end);
  const msLeft=en-now;
  document.getElementById('b-next').textContent=`Ends: ${disp(en)}`;

  if(msLeft<=C.WARN_SECS*1000){
    if(!warnFired){ warnFired=true; startWarn(); }
    showScreen('warning');
    document.getElementById('w-count').textContent=msToMS(msLeft);
    document.getElementById('w-end').textContent=`Session ends at ${disp(en)}`;
    document.getElementById('w-info').innerHTML=
      (active.name?`<strong>${firstName(active.name)}</strong> · `:'')+'Please wrap up and clear the court';
  } else {
    warnFired=false; showScreen('active');
    document.getElementById('a-name').textContent=firstName(active.name)||'Welcome!';
    document.getElementById('a-time').textContent=`${hhmm(st)} – ${hhmm(en)}`;
  }
}

/* Merge consecutive same-name sessions — fixes race condition from simultaneous Wix bookings */
function mergeConsecutive(list){
  const merged=[];
  for(const s of list){
    if(merged.length>0){
      const last=merged[merged.length-1];
      const sameName=last.name.toLowerCase()===s.name.toLowerCase();
      const sameDay=pd(last.start).toDateString()===pd(s.start).toDateString();
      const contiguous=pd(last.end).getTime()===pd(s.start).getTime();
      if(sameName&&sameDay&&contiguous){ last.end=s.end; continue; }
    }
    merged.push({name:s.name,start:s.start,end:s.end});
  }
  return merged;
}

/* Fetch JSONBin */
async function fetchSessions(){
  if(!C.JSONBIN_BIN_ID||C.JSONBIN_BIN_ID==='YOUR_BIN_ID_HERE'){
    const now=Date.now();
    sessions=[{start:new Date(now-20*60000).toISOString(),end:new Date(now+43*60000).toISOString(),name:'Alex Chen'},
              {start:new Date(now+80*60000).toISOString(),end:new Date(now+140*60000).toISOString(),name:'Sam Rivera'}];
    return;
  }
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${C.JSONBIN_BIN_ID}/latest`,
      {headers:{'X-Master-Key':C.JSONBIN_API_KEY}});
    const d=await r.json();
    const raw=(d?.record?.sessions||[])
      .filter(s=>pd(s.end)>new Date(Date.now()-7200000))
      .sort((a,b)=>pd(a.start)-pd(b.start));
    sessions=mergeConsecutive(raw);
  }catch(e){console.warn('JSONBin:',e);}
}

async function init(){ await fetchSessions(); tick(); setInterval(tick,1000); setInterval(fetchSessions,C.POLL_MS); }
init();
</script>

<!--
═══════════════════════════════════════════════════════════
  ZAPIER — Step 3 Code (paste into "Code by Zapier"):

  Map these input variables:
    inputData.rawBin       ← body text from GET step
    inputData.startTime    ← booking start (ISO) from Wix
    inputData.endTime      ← booking end (ISO) from Wix
    inputData.customer     ← customer full name from Wix

  Code:
  ───────────────────────────────────────────────────────
  const parsed = JSON.parse(inputData.rawBin || '{}');
  const sessions = parsed.record?.sessions || parsed.sessions || [];

  sessions.push({
    start: inputData.startTime,
    end:   inputData.endTime,
    name:  inputData.customer
  });

  // Clean up sessions older than 2 hours
  const cutoff = new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString();
  const cleaned = sessions.filter(s => s.end > cutoff);

  output = [{ body: JSON.stringify({ sessions: cleaned }) }];
  ───────────────────────────────────────────────────────
  Step 4 — Webhooks PUT:
    URL:           https://api.jsonbin.io/v3/b/YOUR_BIN_ID
    Payload type:  Raw
    Body:          use "body" from step 3
    Headers:       X-Master-Key → your key
                   Content-Type → application/json
═══════════════════════════════════════════════════════════
-->
